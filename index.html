<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超商咖啡折扣情報站</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- 上方大標題 -->
  <header class="bg-gradient-to-r from-amber-700 to-amber-900 text-white py-8 px-4 text-center shadow-md">
    <h1 class="text-3xl font-bold tracking-wide">☕ 超商咖啡折扣情報站</h1>
    <p class="text-amber-100 text-sm mt-2">即時追蹤 7-11、全家、萊爾富最新咖啡優惠</p>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <!-- 篩選按鈕區（新增歷代封存按鈕） -->
    <div class="flex flex-wrap justify-center gap-2 mb-8" id="filter-buttons">
      <button onclick="filterOffers('全部')" class="filter-btn active px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-amber-600 text-white cursor-pointer">全部</button>
      <button onclick="filterOffers('7-11')" class="filter-btn px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-100 cursor-pointer">7-11</button>
      <button onclick="filterOffers('全家')" class="filter-btn px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-100 cursor-pointer">全家</button>
      <button onclick="filterOffers('萊爾富')" class="filter-btn px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-100 cursor-pointer">萊爾富</button>
      <button onclick="filterOffers('超商綜合')" class="filter-btn px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-100 cursor-pointer">超商綜合</button>
      <button onclick="renderArchiveView()" class="filter-btn px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-stone-700 text-stone-100 hover:bg-stone-800 cursor-pointer">📂 查看歷代封存</button>
    </div>

    <!-- 載入中動畫 -->
    <div id="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-amber-600 border-t-transparent mb-2"></div>
      <p class="text-slate-500 text-sm">正在從雲端載入最新折扣...</p>
    </div>

    <!-- 優惠展示區容器 -->
    <div id="offers-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>

    <!-- 查無資料提示 -->
    <div id="no-data" class="text-center py-12 hidden">
      <p class="text-slate-400 text-lg">目前這個類別沒有進行中的優惠喔！</p>
    </div>
  </main>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbwmov4n-RxaFFHhN1RhbY89FYSZMYyFkqVfIQhvCaqfMA-4zQUXg0O7wMGFxOVu3607/exec'
  let allOffers = [];

  window.addEventListener('DOMContentLoaded', fetchOffers);
  window.onload = fetchOffers;

  async function fetchOffers() {
    try {
      const response = await fetch(API_URL);
      const rawData = await response.json();

   allOffers = rawData.map(row => {
        if (!row) return null;

        // 💡 拋棄不穩定的陣列索引，直接用試算表的欄位名稱強行索取，徹底防範洗牌錯位！
        let rawStore = row["超商名稱"] || row[0] || "";
        let rawContent = row["優惠內容"] || row[1] || "";
        let rawLink = row["來源連結"] || row[2] || "#";
        let rawExpiry = row["截止日期"] || row[3] || "未提供";

        let store = String(rawStore).trim();
        let content = String(rawContent).trim();
        let link = String(rawLink).trim();
        let expiryStr = String(rawExpiry).trim();

        // 排除標頭與空內容
        if (!content || content === '優惠內容' || content === 'undefined') return null;
        
        // 攔截過濾 1970 髒資料與 ISO 戳記
        let expiry = expiryStr.includes('T') ? expiryStr.split('T')[0] : expiryStr;
        if (expiry.includes('1970-01-01') || expiryStr.includes('1970')) {
          let today = new Date();
          let targetDate = new Date(today.getTime() + (3 * 24 * 60 * 60 * 1000));
          let yyyy = targetDate.getFullYear();
          let mm = String(targetDate.getMonth() + 1).padStart(2, '0');
          let dd = String(targetDate.getDate()).padStart(2, '0');
          expiry = `${yyyy}-${mm}-${dd} (未找到過期時間，預設3日後過期)`;
        }

        // 💡 超商分類權威判定：如果後台寫明是 7-11、全家或萊爾富，前端死板服從！
        if (store === '7-11' || store === '全家' || store === '萊爾富') {
          // 尊重試算表原始分類，不做任何改動
        } else {
          // 只有原本是「超商綜合」或空白時，前端才進行關鍵字輔助判定
          let fullText = store + " " + content;
          let has711 = fullText.includes('7-11') || fullText.includes('711');
          let hasFamily = fullText.includes('全家');
          let hasHiLife = fullText.includes('萊爾富');

          if (hasHiLife) store = '萊爾富';
          else if (has711 && !hasFamily) store = '7-11';
          else if (hasFamily && !has711) store = '全家';
          else store = '超商綜合';
        }

        return [store, content, link, expiry];
      }).filter(item => item !== null);

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('offers-container').classList.remove('hidden');

      renderOffers(allOffers);
    } catch (error) {
      console.error('資料抓取失敗:', error);
      document.getElementById('loading').innerHTML = `<p class="text-red-500 font-medium">連線失敗 😳</p>`;
    }
  }

  // 渲染超商卡片
  function renderOffers(offers) {
    const container = document.getElementById('offers-container');
    const noData = document.getElementById('no-data');

    container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6";
    container.innerHTML = '';

    if (!offers || offers.length === 0) {
      noData.classList.remove('hidden');
      return;
    } else {
      noData.classList.add('hidden');
    }

    offers.forEach(item => {
      if (!item) return;
      const storeName = item[0];
      const offerContent = item[1];
      const sourcelink = item[2];
      const expiryDate = item[3];

      let badgeColor = 'bg-purple-500 text-white';
      if (storeName === '7-11') badgeColor = 'bg-orange-500 text-white';
      if (storeName === '全家') badgeColor = 'bg-blue-500 text-white';
      if (storeName === '萊爾富') badgeColor = 'bg-red-500 text-white';

      const cardHtml = `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-all">
          <div class="p-6">
            <span class="inline-block text-xs font-bold px-2.5 py-1 rounded-md mb-3 ${badgeColor}">
              ${storeName}
            </span>
            <h3 class="text-lg font-bold text-slate-800 leading-snug mb-2">${offerContent}</h3>
            <p class="text-xs text-slate-400">截止日期：${expiryDate}</p>
          </div>
          <div class="px-6 pb-6 pt-0">
            <a href="${sourcelink}" target="_blank" class="block text-center bg-amber-500 hover:bg-amber-600 text-white font-medium py-2.5 px-4 rounded-xl transition-colors text-sm">
              ${sourcelink === '#' ? '暫無連結' : '前往搶購 / 查看詳情'}
            </a>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', cardHtml);
    });
  }

  // 按鈕篩選功能
  function filterOffers(storeName) {
    const buttons = document.querySelectorAll('#filter-buttons button');
    buttons.forEach(btn => {
      if (btn.innerText === storeName) {
        btn.className = 'filter-btn active px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-amber-600 text-white';
      } else {
        btn.className = 'filter-btn px-5 py-2 rounded-full font-medium text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-50';
      }
    });

    if (storeName === '全部') {
      renderOffers(allOffers);
    } else {
      const filtered = allOffers.filter(item => item[0] === storeName);
      renderOffers(filtered);
    }
  }
</script>
</body>
</html>
